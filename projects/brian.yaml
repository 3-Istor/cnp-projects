apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: brian-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/3-Istor/cnp-project-base.git
    targetRevision: HEAD
    path: .
    helm:
      values: |
        projectName: "brian"
        features:
          gatus: true
  destination:
    server: https://kubernetes.default.svc
    namespace: brian-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
