apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sandbox-v2-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/3-Istor/infra-templates.git # Ton repo de charts
    targetRevision: HEAD
    path: charts/cnp-project-base
    helm:
      values: |
        projectName: "sandbox-v2"
        features:
          gatus: true
  destination:
    server: https://kubernetes.default.svc
    namespace: project-sandbox-v2-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
